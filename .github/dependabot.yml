version: 2
updates:
  # GitHub Actions のバージョン更新
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  # npm 依存（zenn-cli / lint ツール）の更新
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
    groups:
      lint-tools:
        patterns:
          - "markdownlint-cli2"
          - "textlint*"
