name: secrets-scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: secrets-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          VER=8.28.0
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/bin" gitleaks
      - name: Run gitleaks
        run: "$RUNNER_TEMP/bin/gitleaks" detect --source . --redact --no-banner
