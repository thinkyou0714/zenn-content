name: zenn-auto-publish

on:
  schedule:
    # 公開時刻は 09:00 JST 固定運用のため、その枠（00:00-00:45 UTC = 09:00-09:45 JST）だけ
    # 15分間隔で確認する。終日 */15 で回す必要はない（96回/日 → 4回/日に削減）。
    - cron: '*/15 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Publish scheduled articles
        # サプライチェーン対策としてサードパーティ Action はコミットSHAにピン留め（タグは可変のため）
        uses: x-color/zenn-post-scheduler@4cb199c1c8653465a42bac2e6c7fbccdc5aeb5fb # v1.1.0
        with:
          target_key: publish_scheduled
          path: articles

      - name: Commit and push if changed
        run: |
          git config --local user.email 'bot@thinkyou0714.dev'
          git config --local user.name 'zenn-publisher-bot'
          git add -u articles
          if ! git diff --cached --quiet; then
            git commit -m 'chore: auto-publish scheduled articles'
            git push origin ${{ github.ref_name }}
          fi
